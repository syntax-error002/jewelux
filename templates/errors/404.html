{% extends 'base.html' %}
{% block title %}Page Not Found — JEWELUX{% endblock %}
{% block content %}
<section class="error-section">
  <div class="container">
    <div class="error-content">
      <div class="error-symbol">◈</div>
      <h1 class="error-code">404</h1>
      <h2>Page Not Found</h2>
      <p>The page you are looking for may have been moved, deleted, or never existed. Let us guide you back to our collection.</p>
      <div class="error-actions">
        <a href="{{ url_for('index') }}" class="btn btn-primary">Return Home</a>
        <a href="{{ url_for('shop') }}" class="btn btn-secondary">Browse Shop</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
