{% extends 'base.html' %}
{% block title %}Server Error — JEWELUX{% endblock %}
{% block content %}
<section class="error-section">
  <div class="container">
    <div class="error-content">
      <div class="error-symbol">◎</div>
      <h1 class="error-code">500</h1>
      <h2>Something Went Wrong</h2>
      <p>We apologise for the inconvenience. Our team has been notified and is working to resolve the issue. Please try again in a few moments.</p>
      <div class="error-actions">
        <a href="{{ url_for('index') }}" class="btn btn-primary">Return Home</a>
        <button onclick="window.history.back()" class="btn btn-secondary">Go Back</button>
      </div>
    </div>
  </div>
</section>
{% endblock %}
